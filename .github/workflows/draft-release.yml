name: Draft release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to draft, such as v0.2.0.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: draft-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  draft:
    name: Build artifacts and create draft GitHub Release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release-ref
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$GITHUB_REF_NAME"
          fi

          case "$release_tag" in
            v*) version="${release_tag#v}" ;;
            *)
              echo "Draft releases require a v* tag; got '$release_tag'."
              exit 1
              ;;
          esac

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release-ref.outputs.tag }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: false

      - name: Install dependencies
        run: uv sync --locked

      - name: Validate release metadata and notes
        id: release
        shell: bash
        env:
          VERSION: ${{ steps.release-ref.outputs.version }}
        run: |
          python scripts/prepare_release.py validate "$VERSION"
          python scripts/prepare_release.py notes "$VERSION" --output release-notes.md

      - name: Build, validate, smoke-test, and generate SBOM
        run: make build

      - name: Create or update draft GitHub Release
        id: draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release-ref.outputs.tag }}
          VERSION: ${{ steps.release-ref.outputs.version }}
        run: |
          set -euo pipefail
          title="Release ${RELEASE_TAG}"
          assets=(
            "dist/patiencepilot-${VERSION}.tar.gz"
            "dist/patiencepilot-${VERSION}-py3-none-any.whl"
            "dist/patiencepilot.cdx.json"
          )

          for asset in "${assets[@]}"; do
            if [ ! -f "$asset" ]; then
              echo "Missing release asset: $asset"
              exit 1
            fi
          done

          if gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft > release-state.txt 2>/dev/null; then
            if grep -qx true release-state.txt; then
              gh release edit "$RELEASE_TAG" --draft --title "$title" --notes-file release-notes.md
              gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            else
              echo "Release ${RELEASE_TAG} already exists and is not a draft; leaving it unchanged."
              echo "release_updated=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --verify-tag --draft --title "$title" --notes-file release-notes.md
          fi

          echo "release_updated=true" >> "$GITHUB_OUTPUT"

      - name: Verify draft release assets
        if: steps.draft.outputs.release_updated == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release-ref.outputs.tag }}
          VERSION: ${{ steps.release-ref.outputs.version }}
        run: |
          set -euo pipefail
          expected_assets=(
            "patiencepilot-${VERSION}.tar.gz"
            "patiencepilot-${VERSION}-py3-none-any.whl"
            "patiencepilot.cdx.json"
          )
          asset_names="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"

          for asset in "${expected_assets[@]}"; do
            if ! grep -Fxq "$asset" <<< "$asset_names"; then
              echo "Missing GitHub Release asset: $asset"
              echo "Current uploaded assets:"
              printf '%s\n' "$asset_names"
              exit 1
            fi
          done

          echo "Draft release includes package source distribution, wheel, and SBOM assets."
