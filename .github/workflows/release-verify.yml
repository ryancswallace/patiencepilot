name: Release verification

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to verify, with or without a leading v.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-verify-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-pypi:
    name: Verify PyPI install
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Resolve release version
        id: version
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.version }}
        run: |
          release_ref="${RELEASE_REF}"
          if [ -z "$release_ref" ]; then
            echo "Release verification did not receive a version."
            exit 1
          fi

          case "$release_ref" in
            v*) version="${release_ref#v}" ;;
            *) version="$release_ref" ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: false

      - name: Verify package installation from PyPI
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          verify_env="$(mktemp -d)"
          trap 'rm -rf "$verify_env"' EXIT
          uv venv --quiet "$verify_env"
          for attempt in $(seq 1 20); do
            if VIRTUAL_ENV="$verify_env" uv pip install --quiet "solitaire==$VERSION"; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              echo "Failed to install solitaire==$VERSION from PyPI after $attempt attempts."
              exit 1
            fi
            sleep 30
          done
          "$verify_env/bin/python" -c "from solitaire import __version__; print(__version__)"
