name: Feature request
description: Suggest an improvement to solitaire
title: "feat: "
labels:
  - enhancement
  - needs-triage
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues for similar requests.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation are you trying to address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: How are you handling this today, and what other approaches did you consider?
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note any expected public API compatibility impact.
