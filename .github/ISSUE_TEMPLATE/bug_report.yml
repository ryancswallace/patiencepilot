name: Bug report
description: Report reproducible incorrect behavior in solitaire
title: "bug: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security vulnerabilities, follow SECURITY.md instead of filing a public issue.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues for the same problem.
          required: true
        - label: This report does not include secrets, tokens, or private data.
          required: true
  - type: input
    id: version
    attributes:
      label: solitaire version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.14.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04, macOS 15, Windows 2025"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include the smallest code sample and command that reproduce the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output or traceback
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include relevant operating system, dependency versions, and other details.
