# Repository settings-as-code for the GitHub Settings app.
# Install https://github.com/apps/settings to sync this file from the default
# branch. Settings that GitHub only exposes through UI, rulesets, or external
# services are documented in docs/runbooks/repository-setup.md.

repository:
  description: "Solitaire solver in Python"
  homepage: "https://ryancswallace.github.io/solitaire/"
  topics: "python, solitaire, solver, card-games, game-theory, combinatorial-optimization, artificial-intelligence, search-algorithms"
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true
  default_branch: "main"
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

branches:
  - name: "main"
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: true
      required_status_checks:
        strict: true
        contexts:
          - "Quality checks"
          - "Package build and smoke test"
          - "Minimum dependency tests"
          - "Tests (ubuntu-24.04, Python 3.11)"
          - "Tests (ubuntu-24.04, Python 3.12)"
          - "Tests (ubuntu-24.04, Python 3.13)"
          - "Tests (ubuntu-24.04, Python 3.14)"
      enforce_admins: false
      required_linear_history: true
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: true
      restrictions: null

environments:
  - name: "github-pages"
    deployment_branch_policy:
      custom_branches:
        - main
  - name: "pypi"
    reviewers:
      - id: 20177051  # gh api users/ryancswallace --jq .id
        type: "User"
    deployment_branch_policy:
      custom_branches:
        - name: v*
          type: tag
